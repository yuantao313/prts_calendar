# 定时拉取 PRTS 维基数据，生成 ICS 并仅上传至 Release（不向 main 推送任何文件）
name: Update calendar

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write  # 仅用于创建/更新 Release，不推送代码

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate ICS files (每年 + 当年 + 全量)
        run: python prts_calendar.py --mode all

      - name: Split output for two releases
        run: |
          mkdir -p output_archive output_latest
          # 每年归档：仅 *_YYYY.ics（不要 _latest / _all）
          for f in output/*.ics; do
            case "$f" in
              *'_latest.ics'|*'_all.ics') ;;
              *) cp "$f" output_archive/ ;;
            esac
          done
          # 当年+全量：仅 _latest 与 _all
          cp output/*_latest.ics output/*_all.ics output_latest/
          echo "归档文件数: $(ls output_archive/*.ics 2>/dev/null | wc -l)"
          echo "latest 文件数: $(ls output_latest/*.ics 2>/dev/null | wc -l)"

      # 先处理每年归档，最后再处理当年+全量，保证「当年+全量」为仓库 Latest
      - name: Release「每年归档」- 删除旧资源并上传
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view archive &>/dev/null; then
            for name in $(gh release view archive --json assets -q '.assets[].name'); do
              gh release delete-asset archive "$name" --yes
            done
          fi

      - name: Release「每年归档」- 上传按年 ICS
        uses: softprops/action-gh-release@v2
        with:
          tag_name: archive
          name: 每年归档
          body: "按年份归档的卡池与活动 ICS，可按年下载。"
          files: output_archive/*.ics
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release「当年+全量」- 删除旧资源并上传
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest &>/dev/null; then
            for name in $(gh release view latest --json assets -q '.assets[].name'); do
              gh release delete-asset latest "$name" --yes
            done
          fi

      - name: Release「当年+全量」- 上传 latest 与 all（设为仓库 Latest）
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 当年 + 全量
          body: "当年订阅用 *_latest.ics，全量 *_all.ics，可导入或订阅。"
          files: output_latest/*.ics
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
